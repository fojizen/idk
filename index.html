<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special World For You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html {
            width: 100%; min-height: 100vh; overflow-x: hidden; overflow-y: hidden;
            font-family: 'Press Start 2P', monospace; background-color: #0b0e14;
            -webkit-text-size-adjust: 100%; -webkit-touch-callout: none; touch-action: manipulation;
        }
        html { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .game-container {
            position: relative; width: 100%; min-height: 100vh; height: auto;
            padding-bottom: env(safe-area-inset-bottom);
            background: linear-gradient(to bottom, #1a0b2e 0%, #4c1c5c 40%, #963d61 70%, #d16950 85%, #3c5e3a 85%, #2c4021 100%);
            overflow: hidden; perspective: 1000px;
        }
        .stars {
            position: absolute; width: 100%; height: 70%;
            background-image: radial-gradient(3px 3px at 20px 30px,#fff,rgba(0,0,0,0)),radial-gradient(4px 4px at 60px 130px,#fff,rgba(0,0,0,0)),radial-gradient(3px 3px at 120px 80px,#ffdf6d,rgba(0,0,0,0)),radial-gradient(4px 4px at 240px 40px,#fff,rgba(0,0,0,0));
            background-size: 350px 250px; opacity: 0.6;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none; }
        .sakura-tree { position: absolute; bottom: 15%; width: 100px; height: 160px; z-index: 2; }
        .tree-trunk { position: absolute; bottom: 0; left: 42px; width: 16px; height: 60px; background: #4a2f13; box-shadow: inset -4px 0 0 #331f0c; }
        .tree-leaves { position: absolute; bottom: 50px; left: 0; width: 100px; height: 110px; background: #ffb7c5; box-shadow: inset -10px -10px 0 #ff99b2,0 -15px 0 #ffccd5,-15px -5px 0 #fca1b7,15px -5px 0 #ffaec1,0 10px 0 rgba(0,0,0,0.15); border-radius: 4px; }
        .tree1 { left: 12%; transform: scale(1.1); z-index: 1; }
        .tree2 { right: 15%; transform: scale(1.3); z-index: 2; }
        .tree3 { right: 35%; transform: scale(0.95); opacity: 0.85; z-index: 1; }
        #character { position: absolute; bottom: 15%; left: -200px; width: 120px; height: 180px; z-index: 5; transition: left 3s linear; display: flex; flex-direction: column; align-items: center; }
        .char-composite { position: relative; width: 80px; height: 180px; transform-style: preserve-3d; }
        .char-head { width: 48px; height: 48px; background: #c68c63; position: absolute; top: 0; left: 16px; z-index: 5; image-rendering: pixelated; box-shadow: 0 0 0 2px rgba(0,0,0,0.15); }
        .char-head::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 14px; background: #2a1a12; box-shadow: 0 4px 0 #2a1a12,-4px 4px 0 #2a1a12,4px 4px 0 #2a1a12,0 8px 0 #1c120c; }
        .char-head::after { content: ''; position: absolute; top: 14px; left: 0; width: 48px; height: 34px; }
        #character.look-at-me .char-head::after { transform: translateX(1px); }
        .char-torso { width: 48px; height: 66px; background: #252525; position: absolute; top: 48px; left: 16px; z-index: 4; }
        .arm, .leg { position: absolute; transform-origin: top center; }
        .arm { width: 16px; height: 66px; background: #c68c63; top: 48px; box-shadow: inset 0 22px 0 #252525; }
        .arm.left { left: 0; z-index: 2; } .arm.right { right: 0; z-index: 6; }
        .leg { width: 20px; height: 66px; background: #141414; top: 114px; box-shadow: inset 0 -12px 0 #e6e6e6; }
        .leg.left { left: 16px; z-index: 3; } .leg.right { right: 16px; z-index: 3; }
        .walking .arm.left { animation: mcSwingX 0.6s infinite alternate linear; }
        .walking .arm.right { animation: mcSwingXInverse 0.6s infinite alternate linear; }
        .walking .leg.left { animation: mcSwingXInverse 0.6s infinite alternate linear; }
        .walking .leg.right { animation: mcSwingX 0.6s infinite alternate linear; }
        @keyframes mcSwingX { 0% { transform: rotateX(-30deg); } 100% { transform: rotateX(30deg); } }
        @keyframes mcSwingXInverse { 0% { transform: rotateX(30deg); } 100% { transform: rotateX(-30deg); } }
        .minecraft-sign {
            position: absolute; bottom: 235px; background-color: #a06533; border: 6px solid #5c3a1a;
            padding: 15px 25px; color: #ffffff; font-size: 14px; text-align: center; white-space: nowrap;
            cursor: pointer; box-shadow: 0 6px 0 #000; opacity: 0; transform: scale(0);
            transition: all 0.5s cubic-bezier(0.175,0.885,0.32,1.275); z-index: 10;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .minecraft-sign::after { content: ''; position: absolute; bottom: -36px; left: 45%; width: 12px; height: 32px; background-color: #5c3a1a; box-shadow: 0 4px 0 #000; }
        .minecraft-sign.show { opacity: 1; transform: scale(1); animation: pulseSign 1.5s infinite ease-in-out; }
        @keyframes pulseSign { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 8px 20px rgba(255,215,0,0.6); } }

        /* ZEYNEP YAZISI */
        #zeynep-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 50;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(60px, 14vw, 130px);
            color: #fff;
            text-shadow: 0 0 20px #ff4b72, 0 0 40px #ff4b72, 0 0 80px #ff2255, 0 0 120px #ff0044, 0 0 2px #fff;
            letter-spacing: 6px;
            pointer-events: none;
            opacity: 0;
            white-space: nowrap;
        }
        #zeynep-text.burst-in {
            animation: zeynepZoom 4.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes zeynepZoom {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.05); filter: blur(16px); }
            12%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2);  filter: blur(0px); }
            28%  { transform: translate(-50%, -50%) scale(0.92); }
            42%  { transform: translate(-50%, -50%) scale(1.06); }
            58%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80%  { opacity: 1; transform: translate(-50%, -50%) scale(2.2); filter: blur(0px); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(6);   filter: blur(24px); }
        }

        /* İTİRAF KARTI */
        .confession-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11,10,18,0.88); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 2s ease-in-out; padding: 20px;
        }
        .confession-overlay.active { opacity: 1; pointer-events: auto; }
        .confession-card {
            background: #2c1b33; border: 6px double #bf7099;
            padding: 40px 40px 64px 40px; max-width: 650px; width: 100%;
            text-align: center; box-shadow: 0 0 30px #bf7099;
            transform: translateY(30px); transition: transform 1.5s ease-out;
            position: relative;
        }
        .confession-overlay.active .confession-card { transform: translateY(0); }
        .confession-text { color: #fcd1e6; font-size: 14px; line-height: 2.5; margin-bottom: 25px; text-shadow: 2px 2px 0px #000; }
        .heart-icon { font-size: 40px; color: #ff4b72; animation: heartBeat 1.2s infinite; margin-top: 15px; }
        @keyframes heartBeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        /* ZEYNEP İMZASI */
        #zeynep-signature {
            position: absolute;
            bottom: 18px; right: 28px;
            font-family: 'Dancing Script', cursive;
            font-size: 34px;
            color: #ffb7c5;
            text-shadow: 0 0 14px #ff4b72, 1px 1px 0 #000;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity 1.4s ease 1s, transform 1.4s ease 1s;
            pointer-events: none;
        }
        .confession-overlay.active #zeynep-signature { opacity: 1; transform: translateX(0); }

        .audio-control {
            position: absolute; top: 20px; right: 20px;
            background: #4a355a; border: 3px solid #231230; color: #fff;
            padding: 12px; font-size: 10px; cursor: pointer; z-index: 200;
            box-shadow: 0 4px 0 #000; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        @media screen and (max-width: 560px) {
            .game-container { min-height: 100vh; padding-bottom: calc(env(safe-area-inset-bottom) + 10px); }
            #character { bottom: 12%; width: 100px; height: 150px; }
            .char-composite { width: 70px; height: 160px; transform: scale(0.85); transform-origin: bottom center; }
            .minecraft-sign { bottom: 180px; font-size: 12px; padding: 14px 18px; white-space: normal; width: auto; left: 50%; transform: translateX(-50%); }
            .audio-control { right: 14px; top: 14px; padding: 14px 16px; font-size: 12px; }
            .confession-card { padding: 30px 24px 64px 24px; }
            .confession-text { font-size: 13px; line-height: 1.9; }
            #zeynep-signature { font-size: 26px; right: 18px; bottom: 14px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="stars"></div>
        <div class="sakura-tree tree1"><div class="tree-leaves"></div><div class="tree-trunk"></div></div>
        <div class="sakura-tree tree3"><div class="tree-leaves"></div><div class="tree-trunk"></div></div>
        <div class="sakura-tree tree2"><div class="tree-leaves"></div><div class="tree-trunk"></div></div>
        <canvas id="canvas"></canvas>

        <!-- ZEYNEP yazısı (kalp patladığında) -->
        <div id="zeynep-text">Zeynep</div>

        <button class="audio-control" id="audioBtn">🎵 MUSIC: OFF</button>

        <div id="character" class="walking">
            <div class="char-composite" id="charBody">
                <div class="arm left"></div>
                <div class="leg left"></div>
                <div class="char-torso"></div>
                <div class="char-head"></div>
                <div class="leg right"></div>
                <div class="arm right"></div>
            </div>
            <div class="minecraft-sign" id="sign">CLICK ME!</div>
        </div>

        <div class="confession-overlay" id="overlay">
            <div class="confession-card">
                <p class="confession-text" id="typewriter"></p>
                <div class="heart-icon">❤</div>
                <div id="zeynep-signature">~ Zeynep</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const character = document.getElementById('character');
        const sign = document.getElementById('sign');
        const overlay = document.getElementById('overlay');
        const typewriterText = document.getElementById('typewriter');
        const audioBtn = document.getElementById('audioBtn');
        const zeynepText = document.getElementById('zeynep-text');

        let audioCtx = null;
        let isMusicPlaying = false;
        let fireworks = [];
        let particles = [];
        let heartBurstDone = false;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const targetX = window.innerWidth / 2 - 40;
                character.style.left = targetX + 'px';
                character.addEventListener('transitionend', () => {
                    character.classList.remove('walking');
                    character.classList.add('look-at-me');
                    setTimeout(() => { sign.classList.add('show'); }, 600);
                }, { once: true });
            }, 500);
        });

        sign.addEventListener('click', (e) => {
            e.stopPropagation();
            sign.classList.remove('show');
            sign.style.display = 'none';
            initAudio();

            let structuralInterval = setInterval(() => { createFirework(false); }, 500);
            setTimeout(() => { clearInterval(structuralInterval); createFirework(true); }, 4000);
            setTimeout(() => { displayConfession(); }, 8000);
        });

        function createFirework(isHeart = false) {
            const startX = Math.random() * canvas.width * 0.6 + canvas.width * 0.2;
            const startY = canvas.height;
            const targetX = isHeart ? canvas.width / 2 : startX + (Math.random() * 240 - 120);
            const targetY = isHeart ? canvas.height * 0.35 : Math.random() * canvas.height * 0.3 + canvas.height * 0.1;
            fireworks.push({
                x: startX, y: startY, tx: targetX, ty: targetY,
                speed: 5, angle: Math.atan2(targetY - startY, targetX - startX),
                isHeart: isHeart, hue: isHeart ? 340 : Math.random() * 360
            });
        }

        function showZeynepText() {
            if (heartBurstDone) return;
            heartBurstDone = true;
            zeynepText.classList.remove('burst-in');
            void zeynepText.offsetWidth; // force reflow
            zeynepText.classList.add('burst-in');
        }

        function burstParticles(x, y, isHeart, baseHue) {
            const count = isHeart ? 220 : 70;
            if (isHeart) {
                showZeynepText();
                for (let i = 0; i < count; i++) {
                    let angle = (i / count) * Math.PI * 2;
                    let pX = 26 * Math.pow(Math.sin(angle), 3);
                    let pY = 21 * Math.cos(angle) - 8 * Math.cos(2*angle) - 4 * Math.cos(3*angle) - Math.cos(4*angle);
                    particles.push({ x, y, vx: pX * 0.45, vy: -pY * 0.45, alpha: 1, decay: 0.005 + Math.random() * 0.003, hue: baseHue + (Math.random() * 30 - 15), size: 5 });
                }
            } else {
                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 7 + 2;
                    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, alpha: 1, decay: 0.012 + Math.random() * 0.01, hue: baseHue, size: 4 });
                }
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = fireworks.length - 1; i >= 0; i--) {
                let f = fireworks[i];
                f.x += Math.cos(f.angle) * f.speed;
                f.y += Math.sin(f.angle) * f.speed;
                ctx.fillStyle = `hsl(${f.hue}, 100%, 70%)`;
                ctx.fillRect(f.x, f.y, 5, 5);
                if (Math.abs(f.x - f.tx) < 6 && Math.abs(f.y - f.ty) < 6) {
                    burstParticles(f.tx, f.ty, f.isHeart, f.hue);
                    playBeep(350, "square", 0.1);
                    fireworks.splice(i, 1);
                }
            }
            for (let j = particles.length - 1; j >= 0; j--) {
                let p = particles[j];
                p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.alpha -= p.decay;
                if (p.alpha <= 0) { particles.splice(j, 1); }
                else { ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.alpha})`; ctx.fillRect(p.x, p.y, p.size, p.size); }
            }
            requestAnimationFrame(loop);
        }
        loop();

        const message = "I know expressing my feelings is hard for me, and I usually prefer staying in my own world... But from the moment you walked into my life, everything changed. I really like you, and I want to build a beautiful world together with you.";

        function displayConfession() {
            zeynepText.style.display = 'none';
            overlay.classList.add('active');
            let idx = 0;
            typewriterText.textContent = "";
            function type() {
                if (idx < message.length) { typewriterText.textContent += message.charAt(idx); idx++; setTimeout(type, 50); }
            }
            setTimeout(type, 1000);
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isMusicPlaying = true;
            audioBtn.textContent = "🎵 MUSIC: ON";
            playMelodyLoop();
        }

        function playBeep(freq, type, duration) {
            if (!audioCtx || !isMusicPlaying) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playMelodyLoop() {
            let notes = [261.63, 329.63, 392.00, 523.25, 293.66, 349.23, 440.00, 587.33];
            let step = 0;
            setInterval(() => { if (isMusicPlaying) { playBeep(notes[step % notes.length], "triangle", 0.4); step++; } }, 450);
        }

        audioBtn.addEventListener('click', () => {
            if (!audioCtx) { initAudio(); }
            else { isMusicPlaying = !isMusicPlaying; audioBtn.textContent = isMusicPlaying ? "🎵 MUSIC: ON" : "🎵 MUSIC: OFF"; }
        });
    </script>
</body>
</html>
